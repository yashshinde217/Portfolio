<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/Portfolio/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
      );
    </script>
  </head>
</html>
